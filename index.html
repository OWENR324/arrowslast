<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=10.0, user-scalable=no, viewport-fit=cover">
    <title>Стрелочки — Лабиринт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body {
            background: #0a0e17;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 10px;
            overflow: hidden;
            touch-action: none;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 680px;
            padding: 0 5px;
            touch-action: none;
            transform-origin: center center;
        }

        /* Контейнер для зумирования */
        #zoom-container {
            position: relative;
            width: 100%;
            touch-action: none;
            transform-origin: center center;
            transition: transform 0.05s ease-out;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            padding: 0 5px;
            gap: 6px;
        }

        #back-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #8899aa;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            touch-action: none;
        }
        #back-btn:active {
            transform: scale(0.9);
        }

        #level-text {
            font-size: 14px;
            font-weight: 600;
            color: #8899aa;
            letter-spacing: 2px;
            text-transform: uppercase;
            flex: 1;
            text-align: center;
        }

        #hearts {
            display: flex;
            gap: 2px;
            font-size: 16px;
            flex-shrink: 0;
        }

        .control-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #8899aa;
            cursor: pointer;
            transition: all 0.3s;
            flex-shrink: 0;
            touch-action: none;
        }
        .control-btn:active {
            transform: scale(0.9);
        }
        .control-btn.active {
            color: #00d4ff;
            border-color: rgba(0, 212, 255, 0.3);
            background: rgba(0, 212, 255, 0.1);
        }
        .control-btn.muted {
            opacity: 0.4;
        }

        #canvas-wrapper {
            position: relative;
            background: linear-gradient(145deg, #0f1a2b, #0a0e17);
            border-radius: 14px;
            padding: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.04);
            touch-action: none;
            overflow: hidden;
        }

        #canvas {
            display: block;
            margin: 0 auto;
            cursor: pointer;
            background: transparent;
            border-radius: 4px;
            width: 100%;
            height: auto;
            touch-action: none;
        }

        #message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: clamp(20px, 5vw, 28px);
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 10;
            white-space: nowrap;
            color: #fff;
            text-shadow: 0 0 30px rgba(100, 200, 255, 0.3);
            touch-action: none;
        }

        #message.show {
            opacity: 1;
        }

        #btn-next,
        #btn-retry {
            position: absolute;
            bottom: -48px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border: none;
            border-radius: 22px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            white-space: nowrap;
            touch-action: manipulation;
        }

        #btn-next {
            background: linear-gradient(135deg, #00d4ff, #0077ff);
            color: #fff;
            box-shadow: 0 4px 20px rgba(0, 119, 255, 0.3);
        }

        #btn-retry {
            background: linear-gradient(135deg, #ff6b6b, #ee4444);
            color: #fff;
            box-shadow: 0 4px 20px rgba(238, 68, 68, 0.3);
        }

        #btn-next.show,
        #btn-retry.show {
            opacity: 1;
            pointer-events: all;
        }

        #btn-next:active,
        #btn-retry:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* Кнопки управления зумом */
        #zoom-controls {
            position: absolute;
            right: 12px;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            z-index: 5;
            touch-action: none;
        }

        .zoom-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(10, 14, 23, 0.8);
            backdrop-filter: blur(8px);
            color: #8899aa;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: none;
            user-select: none;
        }
        .zoom-btn:active {
            transform: scale(0.9);
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        #zoom-indicator {
            position: absolute;
            bottom: 60px;
            right: 16px;
            color: rgba(255, 255, 255, 0.3);
            font-size: 11px;
            font-family: monospace;
            z-index: 5;
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 10px;
            backdrop-filter: blur(4px);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        #zoom-indicator.show {
            opacity: 1;
        }

        @media (max-width: 500px) {
            body {
                padding: 6px;
            }
            #game-container {
                max-width: 100%;
                padding: 0;
            }
            #canvas-wrapper {
                padding: 5px;
                border-radius: 10px;
            }
            #back-btn {
                width: 32px;
                height: 32px;
                font-size: 14px;
            }
            .control-btn {
                width: 28px;
                height: 28px;
                font-size: 14px;
            }
            #level-text {
                font-size: 12px;
                letter-spacing: 1px;
            }
            #hearts {
                font-size: 14px;
                gap: 1px;
            }
            #btn-next,
            #btn-retry {
                padding: 8px 18px;
                font-size: 12px;
                bottom: -42px;
                border-radius: 18px;
            }
            .zoom-btn {
                width: 32px;
                height: 32px;
                font-size: 18px;
            }
            #zoom-controls {
                right: 8px;
                bottom: 8px;
                gap: 4px;
            }
        }

        @media (max-width: 380px) {
            #back-btn {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .control-btn {
                width: 24px;
                height: 24px;
                font-size: 12px;
            }
            #level-text {
                font-size: 10px;
            }
            #hearts {
                font-size: 12px;
            }
            #btn-next,
            #btn-retry {
                padding: 6px 14px;
                font-size: 11px;
                bottom: -36px;
            }
            .zoom-btn {
                width: 28px;
                height: 28px;
                font-size: 16px;
            }
            #zoom-controls {
                right: 6px;
                bottom: 6px;
                gap: 3px;
            }
        }

        @media (orientation: landscape) and (max-height: 500px) {
            #game-container {
                max-width: 450px;
            }
            #canvas-wrapper {
                padding: 4px;
            }
            #header {
                margin-bottom: 6px;
            }
            #back-btn {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .control-btn {
                width: 26px;
                height: 26px;
                font-size: 12px;
            }
            #level-text {
                font-size: 11px;
            }
            #hearts {
                font-size: 12px;
            }
            #btn-next,
            #btn-retry {
                padding: 6px 14px;
                font-size: 11px;
                bottom: -36px;
            }
            .zoom-btn {
                width: 28px;
                height: 28px;
                font-size: 16px;
            }
            #zoom-controls {
                right: 6px;
                bottom: 6px;
                gap: 3px;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="zoom-container">
            <div id="header">
                <div id="back-btn">←</div>
                <div id="level-text">Level 1</div>
                <div id="hearts">❤️❤️❤️</div>
                <div id="bg-music-btn" class="control-btn active" title="Фоновая музыка">🔊</div>
                <div id="sfx-btn" class="control-btn active" title="Звуки эффектов">🔊</div>
            </div>
            <div id="canvas-wrapper">
                <canvas id="canvas"></canvas>
                <div id="message"></div>
                <div id="zoom-controls">
                    <div class="zoom-btn" id="zoom-in">➕</div>
                    <div class="zoom-btn" id="zoom-out">➖</div>
                    <div class="zoom-btn" id="zoom-reset">⟲</div>
                </div>
                <div id="zoom-indicator">100%</div>
            </div>
            <button id="btn-next" onclick="nextLevel()">Следующий уровень →</button>
            <button id="btn-retry" onclick="restartLevel()">↻ Попробовать снова</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const messageEl = document.getElementById('message');
        const btnNext = document.getElementById('btn-next');
        const btnRetry = document.getElementById('btn-retry');
        const heartsEl = document.getElementById('hearts');
        const levelTextEl = document.getElementById('level-text');

        // --- МУЛЬТИТАЧ-ЗУМ ---
        const zoomContainer = document.getElementById('zoom-container');
        const zoomIndicator = document.getElementById('zoom-indicator');
        let currentScale = 1;
        const MIN_SCALE = 0.5;
        const MAX_SCALE = 3.0;
        let initialPinchDist = 0;
        let initialScale = 1;
        let isPinching = false;

        function updateZoom(scale, animate = true) {
            currentScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, scale));
            if (!animate) {
                zoomContainer.style.transition = 'none';
            } else {
                zoomContainer.style.transition = 'transform 0.1s ease-out';
            }
            zoomContainer.style.transform = `scale(${currentScale})`;
            
            // Обновляем индикатор
            zoomIndicator.textContent = Math.round(currentScale * 100) + '%';
            zoomIndicator.classList.add('show');
            clearTimeout(zoomIndicator._hideTimer);
            zoomIndicator._hideTimer = setTimeout(() => {
                zoomIndicator.classList.remove('show');
            }, 1500);
        }

        // --- Обработка мультитач ---
        let touchCache = [];

        function getTouchDistance(touches) {
            if (touches.length < 2) return 0;
            const dx = touches[0].clientX - touches[1].clientX;
            const dy = touches[0].clientY - touches[1].clientY;
            return Math.sqrt(dx * dx + dy * dy);
        }

        // Перехватываем touch события для canvas-wrapper
        const canvasWrapper = document.getElementById('canvas-wrapper');

        canvasWrapper.addEventListener('touchstart', function(e) {
            if (e.touches.length === 2) {
                e.preventDefault();
                isPinching = true;
                initialPinchDist = getTouchDistance(e.touches);
                initialScale = currentScale;
                // Сохраняем касания для отслеживания
                touchCache = Array.from(e.touches);
            }
        }, { passive: false });

        canvasWrapper.addEventListener('touchmove', function(e) {
            if (e.touches.length === 2 && isPinching) {
                e.preventDefault();
                const currentDist = getTouchDistance(e.touches);
                if (initialPinchDist > 0) {
                    const scaleFactor = currentDist / initialPinchDist;
                    const newScale = initialScale * scaleFactor;
                    updateZoom(newScale);
                }
                touchCache = Array.from(e.touches);
            }
        }, { passive: false });

        canvasWrapper.addEventListener('touchend', function(e) {
            if (e.touches.length < 2) {
                isPinching = false;
                // Если остался один палец - это клик, передаём в игру
                if (e.touches.length === 1) {
                    const touch = e.touches[0];
                    handleClick({ clientX: touch.clientX, clientY: touch.clientY });
                }
            }
            // Если осталось 2 пальца, обновляем расстояние
            if (e.touches.length === 2) {
                initialPinchDist = getTouchDistance(e.touches);
                initialScale = currentScale;
            }
        }, { passive: false });

        // --- Кнопки управления зумом ---
        document.getElementById('zoom-in').addEventListener('click', function(e) {
            e.stopPropagation();
            updateZoom(currentScale + 0.2);
        });

        document.getElementById('zoom-out').addEventListener('click', function(e) {
            e.stopPropagation();
            updateZoom(currentScale - 0.2);
        });

        document.getElementById('zoom-reset').addEventListener('click', function(e) {
            e.stopPropagation();
            updateZoom(1);
        });

        // Сброс зума при двойном клике (опционально)
        canvas.addEventListener('dblclick', function(e) {
            updateZoom(1);
        });

        // --- ЗВУКИ (правильные пути для GitHub Pages) ---
        const clickSound = new Audio('./5ce50b9d9b56f64.mp3');
        const blockSound = new Audio('./097b6f91f1b281d.mp3');
        const winSound = new Audio('./e4fd05103e0d514.mp3');
        const bgMusic = new Audio('./celestial-serenity_89982.mp3');

        clickSound.preload = 'auto';
        blockSound.preload = 'auto';
        winSound.preload = 'auto';
        bgMusic.loop = true;
        bgMusic.volume = 0.25;
        bgMusic.preload = 'auto';

        // --- УПРАВЛЕНИЕ ЗВУКОМ ---
        let isBgMusicOn = true;
        let isSfxOn = true;
        let musicStarted = false;

        const bgMusicBtn = document.getElementById('bg-music-btn');
        const sfxBtn = document.getElementById('sfx-btn');

        function playSound(audio) {
            if (!isSfxOn) return;
            try {
                audio.currentTime = 0;
                audio.play().catch(() => {});
            } catch (e) {}
        }

        function startBackgroundMusic() {
            if (!isBgMusicOn || musicStarted) return;
            try {
                bgMusic.play().catch(() => {});
                musicStarted = true;
            } catch (e) {}
        }

        bgMusicBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            isBgMusicOn = !isBgMusicOn;
            if (isBgMusicOn) {
                this.textContent = '🔊';
                this.classList.remove('muted');
                this.classList.add('active');
                if (musicStarted) {
                    bgMusic.play().catch(() => {});
                } else {
                    startBackgroundMusic();
                }
            } else {
                this.textContent = '🔇';
                this.classList.add('muted');
                this.classList.remove('active');
                bgMusic.pause();
            }
        });

        sfxBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            isSfxOn = !isSfxOn;
            if (isSfxOn) {
                this.textContent = '🔊';
                this.classList.remove('muted');
                this.classList.add('active');
            } else {
                this.textContent = '🔇';
                this.classList.add('muted');
                this.classList.remove('active');
            }
        });

        // --- ОСТАЛЬНОЙ КОД ИГРЫ (весь ваш оригинальный код) ---
        const COLS = 55;
        const ROWS = 38;
        let CELL_SIZE = 14;
        const LINE_WIDTH = 2.2;
        const ARROW_HEAD_SIZE = 7;
        const GAP = 1;

        function getCellSize() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const containerWidth = Math.min(width - 20, 680);
            const containerHeight = height - 160;
            let maxWidth = containerWidth - 20;
            let maxHeight = containerHeight - 20;
            const cellByWidth = Math.floor(maxWidth / COLS);
            const cellByHeight = Math.floor(maxHeight / ROWS);
            let cellSize = Math.min(cellByWidth, cellByHeight, 16);
            cellSize = Math.max(cellSize, 7);
            return cellSize;
        }

        function resizeCanvas() {
            const cellSize = getCellSize();
            canvas.width = COLS * cellSize;
            canvas.height = ROWS * cellSize;
            CELL_SIZE = cellSize;
            const rect = canvas.parentElement.getBoundingClientRect();
            const cssWidth = rect.width - 16;
            const cssHeight = (canvas.height / canvas.width) * cssWidth;
            canvas.style.width = cssWidth + 'px';
            canvas.style.height = cssHeight + 'px';

            for (const path of paths) {
                path._points = null;
            }
        }

        const DIRS = [
            { dx: 0, dy: -1 },
            { dx: 1, dy: 0 },
            { dx: 0, dy: 1 },
            { dx: -1, dy: 0 }
        ];

        const COLORS = [
            '#00d4ff', '#ff6b9d', '#ffd93d', '#6bcb77', '#a66cff',
            '#ff8a5c', '#4fc3f7', '#ff80ab', '#ffd54f', '#81c784',
            '#ff5252', '#e040fb', '#69f0ae', '#40c4ff', '#ffab40'
        ];

        let level = 1;
        let lives = 3;
        let paths = [];
        let grid = [];
        let gameState = 'playing';
        let shakePath = null;
        let shakeTimer = 0;
        let particles = [];

        class Particle {
            constructor(x, y, dir, color, speed) {
                this.x = x;
                this.y = y;
                this.dir = dir;
                this.color = color;
                this.speed = speed || (1.5 + Math.random() * 2.5);
                this.size = 1.5 + Math.random() * 3;
                this.progress = 0;
                this.alive = true;
                this.offsetX = (Math.random() - 0.5) * 3;
                this.offsetY = (Math.random() - 0.5) * 3;
                this.glowSize = this.size * 3;
            }

            update() {
                this.progress += 0.025 + Math.random() * 0.015;
                if (this.progress >= 1) {
                    this.alive = false;
                    return;
                }
                this.x += this.dir.dx * this.speed * 0.8 + this.offsetX * 0.1;
                this.y += this.dir.dy * this.speed * 0.8 + this.offsetY * 0.1;
                this.offsetX += (Math.random() - 0.5) * 0.3;
                this.offsetY += (Math.random() - 0.5) * 0.3;
                this.size *= 0.998;
                this.glowSize *= 0.995;
            }

            draw() {
                if (!this.alive) return;
                const alpha = 1 - this.progress * 0.95;
                const eased = this.progress * this.progress * (3 - 2 * this.progress);

                ctx.save();
                ctx.globalAlpha = alpha;

                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.glowSize * (1 - eased * 0.5)
                );
                gradient.addColorStop(0, this.color);
                gradient.addColorStop(0.3, this.color + '88');
                gradient.addColorStop(1, 'transparent');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.glowSize * (1 - eased * 0.3), 0, Math.PI * 2);
                ctx.fill();

                ctx.shadowColor = this.color;
                ctx.shadowBlur = 8 * (1 - eased * 0.5);
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (this.size > 2) {
                    const s = this.size * (1 - eased * 0.3);
                    ctx.rect(this.x - s / 2, this.y - s / 2, s, s);
                } else {
                    ctx.arc(this.x, this.y, this.size * (1 - eased * 0.3), 0, Math.PI * 2);
                }
                ctx.fill();
                ctx.restore();
            }
        }

        class Path {
            constructor(cells, dir, order) {
                this.cells = cells;
                this.dir = dir;
                this.order = order;
                this.removed = false;
                this.startCol = cells[0].col;
                this.startRow = cells[0].row;
                this.endCol = cells[cells.length - 1].col;
                this.endRow = cells[cells.length - 1].row;
                this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
                this._points = null;
            }

            getPoints() {
                if (!this._points) {
                    this._points = this.cells.map(cell => ({
                        x: cell.col * CELL_SIZE + CELL_SIZE / 2,
                        y: cell.row * CELL_SIZE + CELL_SIZE / 2
                    }));
                }
                return this._points;
            }

            isBlocked() {
                const d = DIRS[this.dir];
                let c = this.endCol + d.dx;
                let r = this.endRow + d.dy;
                while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                    if (grid[r][c] && grid[r][c] !== this && !grid[r][c].removed) {
                        return true;
                    }
                    c += d.dx;
                    r += d.dy;
                }
                return false;
            }

            explode() {
                playSound(clickSound);

                const d = DIRS[this.dir];
                for (const cell of this.cells) {
                    const x = cell.col * CELL_SIZE + CELL_SIZE / 2;
                    const y = cell.row * CELL_SIZE + CELL_SIZE / 2;
                    const numParticles = 3 + Math.floor(Math.random() * 4);
                    for (let i = 0; i < numParticles; i++) {
                        const speed = 1 + Math.random() * 3;
                        particles.push(new Particle(
                            x + (Math.random() - 0.5) * 4,
                            y + (Math.random() - 0.5) * 4,
                            d,
                            this.color,
                            speed
                        ));
                    }
                }

                const lastCell = this.cells[this.cells.length - 1];
                const ex = lastCell.col * CELL_SIZE + CELL_SIZE / 2;
                const ey = lastCell.row * CELL_SIZE + CELL_SIZE / 2;
                for (let i = 0; i < 10; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const speed = 0.5 + Math.random() * 2;
                    const p = new Particle(
                        ex + (Math.random() - 0.5) * 6,
                        ey + (Math.random() - 0.5) * 6, { dx: Math.cos(angle) * 0.3 + d.dx * 0.7, dy: Math.sin(angle) *
                            0.3 + d.dy * 0.7 },
                        this.color,
                        speed
                    );
                    p.size = 1 + Math.random() * 2;
                    particles.push(p);
                }

                this.removed = true;
                for (const cell of this.cells) {
                    if (grid[cell.row] && grid[cell.row][cell.col] === this) {
                        grid[cell.row][cell.col] = null;
                    }
                }
                this._points = null;
            }

            draw(isShaking) {
                if (this.removed) return;
                ctx.save();

                let offsetX = 0,
                    offsetY = 0;
                if (isShaking && shakePath === this) {
                    offsetX = (Math.random() - 0.5) * 6;
                    offsetY = (Math.random() - 0.5) * 6;
                }
                ctx.translate(offsetX, offsetY);

                const points = this.getPoints();

                const wallColor = this.color + '18';
                const wallBorder = this.color + '35';
                const pad = Math.max(1, CELL_SIZE * 0.08);

                for (const cell of this.cells) {
                    const cx = cell.col * CELL_SIZE;
                    const cy = cell.row * CELL_SIZE;

                    ctx.fillStyle = this.color + '06';
                    ctx.fillRect(cx + pad, cy + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2);

                    ctx.strokeStyle = wallBorder;
                    ctx.lineWidth = 0.8;
                    ctx.strokeRect(cx + pad, cy + pad, CELL_SIZE - pad * 2, CELL_SIZE - pad * 2);
                }

                const innerPoints = this.cells.map(cell => ({
                    x: cell.col * CELL_SIZE + CELL_SIZE / 2,
                    y: cell.row * CELL_SIZE + CELL_SIZE / 2
                }));

                ctx.shadowColor = this.color;
                ctx.shadowBlur = 10;
                ctx.strokeStyle = this.color;
                ctx.lineWidth = LINE_WIDTH + 0.8;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.beginPath();
                ctx.moveTo(innerPoints[0].x, innerPoints[0].y);
                for (let i = 1; i < innerPoints.length; i++) {
                    ctx.lineTo(innerPoints[i].x, innerPoints[i].y);
                }
                ctx.stroke();

                ctx.shadowBlur = 0;
                ctx.strokeStyle = 'rgba(255,255,255,0.85)';
                ctx.lineWidth = LINE_WIDTH;
                ctx.beginPath();
                ctx.moveTo(innerPoints[0].x, innerPoints[0].y);
                for (let i = 1; i < innerPoints.length; i++) {
                    ctx.lineTo(innerPoints[i].x, innerPoints[i].y);
                }
                ctx.stroke();

                const end = innerPoints[innerPoints.length - 1];
                this.drawArrowHead(end.x, end.y, this.dir);
                ctx.restore();
            }

            drawArrowHead(x, y, dir) {
                const size = ARROW_HEAD_SIZE;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = 12;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (dir === 0) {
                    ctx.moveTo(x, y - size);
                    ctx.lineTo(x - size * 0.6, y + size * 0.3);
                    ctx.lineTo(x + size * 0.6, y + size * 0.3);
                } else if (dir === 1) {
                    ctx.moveTo(x + size, y);
                    ctx.lineTo(x - size * 0.3, y - size * 0.6);
                    ctx.lineTo(x - size * 0.3, y + size * 0.6);
                } else if (dir === 2) {
                    ctx.moveTo(x, y + size);
                    ctx.lineTo(x - size * 0.6, y - size * 0.3);
                    ctx.lineTo(x + size * 0.6, y - size * 0.3);
                } else {
                    ctx.moveTo(x - size, y);
                    ctx.lineTo(x + size * 0.3, y - size * 0.6);
                    ctx.lineTo(x + size * 0.3, y + size * 0.6);
                }
                ctx.closePath();
                ctx.fill();

                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(255,255,255,0.95)';
                ctx.beginPath();
                if (dir === 0) {
                    ctx.moveTo(x, y - size * 0.8);
                    ctx.lineTo(x - size * 0.5, y + size * 0.25);
                    ctx.lineTo(x + size * 0.5, y + size * 0.25);
                } else if (dir === 1) {
                    ctx.moveTo(x + size * 0.8, y);
                    ctx.lineTo(x - size * 0.25, y - size * 0.5);
                    ctx.lineTo(x - size * 0.25, y + size * 0.5);
                } else if (dir === 2) {
                    ctx.moveTo(x, y + size * 0.8);
                    ctx.lineTo(x - size * 0.5, y - size * 0.25);
                    ctx.lineTo(x + size * 0.5, y - size * 0.25);
                } else {
                    ctx.moveTo(x - size * 0.8, y);
                    ctx.lineTo(x + size * 0.25, y - size * 0.5);
                    ctx.lineTo(x + size * 0.25, y + size * 0.5);
                }
                ctx.closePath();
                ctx.fill();
            }

            contains(col, row) {
                return this.cells.some(c => c.col === col && c.row === row);
            }
        }

        function isCellFree(col, row, excludePath = null) {
            if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return false;
            if (grid[row][col] && grid[row][col] !== excludePath) return false;
            for (let dr = -GAP; dr <= GAP; dr++) {
                for (let dc = -GAP; dc <= GAP; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    const nr = row + dr;
                    const nc = col + dc;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
                        const neighbor = grid[nr][nc];
                        if (neighbor && neighbor !== excludePath) {
                            return false;
                        }
                    }
                }
            }
            return true;
        }

        function isCellFreeForPath(col, row, pathCells) {
            if (pathCells.some(c => c.col === col && c.row === row)) return false;
            return isCellFree(col, row, null);
        }

        function getTargetPath(path, gridRef) {
            const d = DIRS[path.dir];
            let c = path.endCol + d.dx;
            let r = path.endRow + d.dy;
            while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                if (gridRef[r][c] && gridRef[r][c] !== path && !gridRef[r][c].removed) {
                    return gridRef[r][c];
                }
                c += d.dx;
                r += d.dy;
            }
            return null;
        }

        function wouldCreateCycle(newPath, gridRef) {
            for (const cell of newPath.cells) {
                gridRef[cell.row][cell.col] = newPath;
            }

            let hasCycle = false;
            const target = getTargetPath(newPath, gridRef);
            if (target) {
                const visited = new Set();
                let current = target;
                while (current && !hasCycle) {
                    if (current === newPath) {
                        hasCycle = true;
                        break;
                    }
                    if (visited.has(current)) {
                        hasCycle = true;
                        break;
                    }
                    visited.add(current);
                    current = getTargetPath(current, gridRef);
                }
            }

            for (const cell of newPath.cells) {
                gridRef[cell.row][cell.col] = null;
            }

            return hasCycle;
        }

        function buildPath(startCol, startRow, startDir, minLen, maxLen) {
            let cells = [{ col: startCol, row: startRow }];
            let currentCol = startCol;
            let currentRow = startRow;
            let dir = startDir;
            const targetLen = minLen + Math.floor(Math.random() * (maxLen - minLen + 1));

            for (let i = 1; i < targetLen; i++) {
                if (i > 1 && Math.random() < 0.35) {
                    const possibleDirs = [0, 1, 2, 3].filter(d => d !== dir && d !== (dir + 2) % 4);
                    if (possibleDirs.length > 0) {
                        dir = possibleDirs[Math.floor(Math.random() * possibleDirs.length)];
                    }
                }

                const d = DIRS[dir];
                const nextCol = currentCol + d.dx;
                const nextRow = currentRow + d.dy;

                if (!isCellFreeForPath(nextCol, nextRow, cells)) {
                    const shuffled = [0, 1, 2, 3]
                        .filter(d => d !== (dir + 2) % 4)
                        .sort(() => Math.random() - 0.5);

                    let found = false;
                    for (const testDir of shuffled) {
                        const td = DIRS[testDir];
                        const nc = currentCol + td.dx;
                        const nr = currentRow + td.dy;
                        if (cells.some(c => c.col === nc && c.row === nr)) continue;
                        if (isCellFree(nc, nr, null)) {
                            cells.push({ col: nc, row: nr });
                            currentCol = nc;
                            currentRow = nr;
                            dir = testDir;
                            found = true;
                            break;
                        }
                    }
                    if (!found) break;
                } else {
                    cells.push({ col: nextCol, row: nextRow });
                    currentCol = nextCol;
                    currentRow = nextRow;
                }
            }

            if (cells.length < minLen) return null;
            return cells;
        }

        function directionPointsAtPathCells(cells, finalDir) {
            const last = cells[cells.length - 1];
            const d = DIRS[finalDir];
            let c = last.col + d.dx;
            let r = last.row + d.dy;
            while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                if (cells.some(pc => pc.col === c && pc.row === r)) return true;
                c += d.dx;
                r += d.dy;
            }
            return false;
        }

        function isLevelSolvable() {
            const n = paths.length;
            if (n === 0) return true;

            const pointsAt = Array.from({ length: n }, () => new Set());

            for (let i = 0; i < n; i++) {
                const p1 = paths[i];
                if (p1.removed) continue;
                const d = DIRS[p1.dir];
                let c = p1.endCol + d.dx;
                let r = p1.endRow + d.dy;
                while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                    if (grid[r][c] && grid[r][c] !== p1 && !grid[r][c].removed) {
                        const j = paths.indexOf(grid[r][c]);
                        if (j !== -1) pointsAt[i].add(j);
                        break;
                    }
                    c += d.dx;
                    r += d.dy;
                }
            }

            const canRemove = new Array(n).fill(false);
            let changed = true;

            while (changed) {
                changed = false;
                for (let i = 0; i < n; i++) {
                    if (canRemove[i]) continue;
                    let blockedBySomeone = false;
                    for (let j = 0; j < n; j++) {
                        if (pointsAt[j].has(i) && !canRemove[j]) {
                            blockedBySomeone = true;
                            break;
                        }
                    }
                    if (!blockedBySomeone) {
                        canRemove[i] = true;
                        changed = true;
                    }
                }
            }

            return canRemove.every(v => v);
        }

        function breakCycles() {
            const n = paths.length;
            if (n === 0) return;

            const pointsAt = Array.from({ length: n }, () => new Set());

            for (let i = 0; i < n; i++) {
                const p1 = paths[i];
                if (p1.removed) continue;
                const d = DIRS[p1.dir];
                let c = p1.endCol + d.dx;
                let r = p1.endRow + d.dy;
                while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                    if (grid[r][c] && grid[r][c] !== p1 && !grid[r][c].removed) {
                        const j = paths.indexOf(grid[r][c]);
                        if (j !== -1) pointsAt[i].add(j);
                        break;
                    }
                    c += d.dx;
                    r += d.dy;
                }
            }

            let canRemove = new Array(n).fill(false);
            let changed = true;
            while (changed) {
                changed = false;
                for (let i = 0; i < n; i++) {
                    if (canRemove[i]) continue;
                    let blockedBySomeone = false;
                    for (let j = 0; j < n; j++) {
                        if (pointsAt[j].has(i) && !canRemove[j]) {
                            blockedBySomeone = true;
                            break;
                        }
                    }
                    if (!blockedBySomeone) {
                        canRemove[i] = true;
                        changed = true;
                    }
                }
            }

            for (let i = 0; i < n; i++) {
                if (canRemove[i]) continue;
                const p = paths[i];
                if (p.removed) continue;
                const originalDir = p.dir;

                for (let d = 0; d < 4; d++) {
                    if (d === originalDir) continue;
                    if (directionPointsAtPathCells(p.cells, d)) continue;

                    const dir = DIRS[d];
                    let c = p.endCol + dir.dx;
                    let r = p.endRow + dir.dy;
                    let blocked = false;
                    while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                        if (grid[r][c] && grid[r][c] !== p && !grid[r][c].removed) {
                            blocked = true;
                            break;
                        }
                        c += dir.dx;
                        r += dir.dy;
                    }

                    if (!blocked) {
                        p.dir = d;
                        break;
                    }
                }
            }
        }

        function generateLevel(lvl) {
            let attempts = 0;
            const maxAttempts = 50;

            do {
                grid = Array.from({ length: ROWS }, () => Array(COLS).fill(null));
                paths = [];
                attempts++;

                const numArrows = 45;
                const minLen = 7;
                const maxLen = 14;

                function shuffle(arr) {
                    for (let i = arr.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [arr[i], arr[j]] = [arr[j], arr[i]];
                    }
                    return arr;
                }

                const edgeStarts = [];
                for (let c = 3; c < COLS - 3; c += 3) {
                    edgeStarts.push({ col: c, row: 2, preferredDir: 2 });
                }
                for (let c = 3; c < COLS - 3; c += 3) {
                    edgeStarts.push({ col: c, row: ROWS - 3, preferredDir: 0 });
                }
                for (let r = 3; r < ROWS - 3; r += 3) {
                    edgeStarts.push({ col: 2, row: r, preferredDir: 1 });
                }
                for (let r = 3; r < ROWS - 3; r += 3) {
                    edgeStarts.push({ col: COLS - 3, row: r, preferredDir: 3 });
                }
                shuffle(edgeStarts);

                for (const start of edgeStarts) {
                    if (paths.length >= numArrows) break;
                    if (!isCellFree(start.col, start.row, null)) continue;

                    const pathCells = buildPath(start.col, start.row, start.preferredDir, minLen, maxLen);
                    if (!pathCells || pathCells.length < minLen) continue;

                    const last = pathCells[pathCells.length - 1];
                    const prev = pathCells[pathCells.length - 2];
                    const dx = last.col - prev.col;
                    const dy = last.row - prev.row;
                    let finalDir = 0;
                    for (let i = 0; i < 4; i++) {
                        if (DIRS[i].dx === dx && DIRS[i].dy === dy) {
                            finalDir = i;
                            break;
                        }
                    }

                    if (directionPointsAtPathCells(pathCells, finalDir)) continue;

                    const p = new Path(pathCells, finalDir, paths.length);

                    if (wouldCreateCycle(p, grid)) continue;

                    for (const cell of pathCells) {
                        grid[cell.row][cell.col] = p;
                    }
                    const blocked = p.isBlocked();
                    for (const cell of pathCells) {
                        grid[cell.row][cell.col] = null;
                    }
                    if (blocked) continue;

                    for (const cell of pathCells) {
                        grid[cell.row][cell.col] = p;
                    }
                    paths.push(p);
                }

                let freeCells = [];
                for (let r = 2; r < ROWS - 2; r++) {
                    for (let c = 2; c < COLS - 2; c++) {
                        if (isCellFree(c, r, null)) {
                            freeCells.push({ col: c, row: r });
                        }
                    }
                }
                shuffle(freeCells);

                while (freeCells.length > 0 && paths.length < numArrows) {
                    const start = freeCells[0];
                    if (!isCellFree(start.col, start.row, null)) {
                        freeCells.shift();
                        continue;
                    }

                    const distToEdge = [
                        start.row,
                        COLS - 1 - start.col,
                        ROWS - 1 - start.row,
                        start.col
                    ];
                    const preferredDirs = [0, 1, 2, 3]
                        .sort((a, b) => distToEdge[b] - distToEdge[a]);

                    let bestPath = null;
                    let bestDir = 0;

                    for (const dir of preferredDirs) {
                        const pathCells = buildPath(start.col, start.row, dir, minLen, maxLen);
                        if (pathCells && pathCells.length >= minLen) {
                            const last = pathCells[pathCells.length - 1];
                            const prev = pathCells[pathCells.length - 2];
                            const dx = last.col - prev.col;
                            const dy = last.row - prev.row;
                            let finalDir = 0;
                            for (let i = 0; i < 4; i++) {
                                if (DIRS[i].dx === dx && DIRS[i].dy === dy) {
                                    finalDir = i;
                                    break;
                                }
                            }

                            if (directionPointsAtPathCells(pathCells, finalDir)) continue;

                            const tempPath = new Path(pathCells, finalDir, -1);
                            if (wouldCreateCycle(tempPath, grid)) continue;

                            for (const cell of pathCells) {
                                grid[cell.row][cell.col] = tempPath;
                            }
                            const blocked = tempPath.isBlocked();
                            for (const cell of pathCells) {
                                grid[cell.row][cell.col] = null;
                            }

                            if (!blocked) {
                                bestPath = pathCells;
                                bestDir = finalDir;
                                break;
                            }
                        }
                    }

                    if (bestPath) {
                        const p = new Path(bestPath, bestDir, paths.length);
                        for (const cell of bestPath) {
                            grid[cell.row][cell.col] = p;
                        }
                        paths.push(p);

                        freeCells = freeCells.filter(fc => {
                            return !bestPath.some(bp => bp.col === fc.col && bp.row === fc.row);
                        });
                    } else {
                        freeCells.shift();
                    }
                }

                freeCells = [];
                for (let r = 2; r < ROWS - 2; r++) {
                    for (let c = 2; c < COLS - 2; c++) {
                        if (isCellFree(c, r, null)) {
                            freeCells.push({ col: c, row: r });
                        }
                    }
                }
                shuffle(freeCells);

                while (freeCells.length > 0 && paths.length < numArrows) {
                    const start = freeCells[0];
                    if (!isCellFree(start.col, start.row, null)) {
                        freeCells.shift();
                        continue;
                    }

                    const pathCells = buildPath(start.col, start.row, Math.floor(Math.random() * 4), 4, 8);
                    if (pathCells && pathCells.length >= 4) {
                        const last = pathCells[pathCells.length - 1];
                        const prev = pathCells[pathCells.length - 2];
                        const dx = last.col - prev.col;
                        const dy = last.row - prev.row;
                        let finalDir = 0;
                        for (let i = 0; i < 4; i++) {
                            if (DIRS[i].dx === dx && DIRS[i].dy === dy) {
                                finalDir = i;
                                break;
                            }
                        }

                        if (directionPointsAtPathCells(pathCells, finalDir)) {
                            freeCells.shift();
                            continue;
                        }

                        const tempPath = new Path(pathCells, finalDir, -1);
                        if (wouldCreateCycle(tempPath, grid)) {
                            freeCells.shift();
                            continue;
                        }

                        for (const cell of pathCells) {
                            grid[cell.row][cell.col] = tempPath;
                        }
                        const blocked = tempPath.isBlocked();
                        for (const cell of pathCells) {
                            grid[cell.row][cell.col] = null;
                        }

                        if (!blocked) {
                            const p = new Path(pathCells, finalDir, paths.length);
                            for (const cell of pathCells) {
                                grid[cell.row][cell.col] = p;
                            }
                            paths.push(p);
                            freeCells = freeCells.filter(fc => {
                                return !pathCells.some(bp => bp.col === fc.col && bp.row === fc.row);
                            });
                        } else {
                            freeCells.shift();
                        }
                    } else {
                        freeCells.shift();
                    }
                }

                breakCycles();

                if (!isLevelSolvable()) {
                    continue;
                }

                break;

            } while (attempts < maxAttempts);

            recalculateOrder();
        }

        function recalculateOrder() {
            const n = paths.length;
            if (n === 0) return;

            const adj = Array.from({ length: n }, () => []);
            const inDegree = new Array(n).fill(0);

            for (let i = 0; i < n; i++) {
                for (let j = 0; j < n; j++) {
                    if (i === j) continue;
                    const p1 = paths[i];
                    const p2 = paths[j];
                    if (p1.removed || p2.removed) continue;

                    const d = DIRS[p1.dir];
                    let c = p1.endCol + d.dx;
                    let r = p1.endRow + d.dy;
                    let pointsAt = false;
                    while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                        if (grid[r][c] === p2) {
                            pointsAt = true;
                            break;
                        }
                        c += d.dx;
                        r += d.dy;
                    }

                    if (pointsAt) {
                        adj[j].push(i);
                        inDegree[i]++;
                    }
                }
            }

            const queue = [];
            for (let i = 0; i < n; i++) {
                if (inDegree[i] === 0) queue.push(i);
            }

            const newOrder = [];
            while (queue.length > 0) {
                const u = queue.shift();
                newOrder.push(u);
                for (const v of adj[u]) {
                    inDegree[v]--;
                    if (inDegree[v] === 0) queue.push(v);
                }
            }

            if (newOrder.length < n) {
                const inOrder = new Set(newOrder);
                for (let i = 0; i < n; i++) {
                    if (!inOrder.has(i) && !paths[i].removed) {
                        const p = paths[i];
                        for (let d = 0; d < 4; d++) {
                            if (directionPointsAtPathCells(p.cells, d)) continue;

                            const dir = DIRS[d];
                            let c = p.endCol + dir.dx;
                            let r = p.endRow + dir.dy;
                            let blocked = false;
                            while (c >= 0 && c < COLS && r >= 0 && r < ROWS) {
                                if (grid[r][c] && grid[r][c] !== p && !grid[r][c].removed) {
                                    blocked = true;
                                    break;
                                }
                                c += dir.dx;
                                r += dir.dy;
                            }
                            if (!blocked) {
                                p.dir = d;
                                break;
                            }
                        }
                    }
                }
                recalculateOrder();
                return;
            }

            for (let i = 0; i < newOrder.length; i++) {
                paths[newOrder[i]].order = i;
            }

            paths.sort((a, b) => a.order - b.order);
            for (let i = 0; i < paths.length; i++) {
                paths[i].order = i;
            }
        }

        function updateHearts() {
            let hearts = '';
            for (let i = 0; i < 3; i++) {
                hearts += i < lives ? '❤️' : '🖤';
            }
            heartsEl.textContent = hearts;
        }

        function showMessage(text, color) {
            messageEl.textContent = text;
            messageEl.style.color = color;
            messageEl.classList.add('show');
            setTimeout(() => messageEl.classList.remove('show'), 1200);
        }

        function handleClick(e) {
            if (gameState !== 'playing') return;

            startBackgroundMusic();

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            const col = Math.floor(x / CELL_SIZE);
            const row = Math.floor(y / CELL_SIZE);
            if (col < 0 || col >= COLS || row < 0 || row >= ROWS) return;

            const path = grid[row][col];
            if (!path || path.removed) return;

            if (path.isBlocked()) {
                playSound(blockSound);
                
                lives--;
                updateHearts();
                shakePath = path;
                shakeTimer = 15;
                showMessage('Заблокирована!', '#ff6b6b');

                if (lives <= 0) {
                    gameState = 'lost';
                    setTimeout(() => {
                        showMessage('Игра окончена!', '#ff6b6b');
                        btnRetry.classList.add('show');
                    }, 800);
                }
            } else {
                path.explode();
            }
        }

        function nextLevel() {
            level++;
            lives = 3;
            gameState = 'playing';
            btnNext.classList.remove('show');
            btnRetry.classList.remove('show');
            levelTextEl.textContent = `Level ${level}`;
            updateHearts();
            particles = [];
            generateLevel(level);
            resizeCanvas();
            // Сброс зума при переходе на новый уровень
            updateZoom(1, false);
        }

        function restartLevel() {
            lives = 3;
            gameState = 'playing';
            btnNext.classList.remove('show');
            btnRetry.classList.remove('show');
            updateHearts();
            particles = [];
            generateLevel(level);
            resizeCanvas();
            updateZoom(1, false);
        }

        function drawGrid() {
            ctx.strokeStyle = 'rgba(255,255,255,0.03)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }
        }

        function gameLoop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const grad = ctx.createRadialGradient(
                canvas.width / 2, canvas.height / 2, 0,
                canvas.width / 2, canvas.height / 2, canvas.width / 1.5
            );
            grad.addColorStop(0, 'rgba(20,40,80,0.3)');
            grad.addColorStop(1, 'rgba(0,0,0,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            drawGrid();

            if (shakeTimer > 0) {
                shakeTimer--;
                if (shakeTimer <= 0) shakePath = null;
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                if (!particles[i].alive) {
                    particles.splice(i, 1);
                }
            }

            for (const path of paths) {
                if (!path.removed) {
                    path.draw(shakeTimer > 0);
                }
            }

            for (const p of particles) {
                p.draw();
            }

            const remaining = paths.filter(p => !p.removed).length;
            if (remaining === 0 && particles.length === 0 && gameState === 'playing') {
                gameState = 'won';
                playSound(winSound);
                setTimeout(() => {
                    showMessage('Уровень пройден! 🎉', '#00d4ff');
                    btnNext.classList.add('show');
                }, 300);
            }

            requestAnimationFrame(gameLoop);
        }

        // --- Обработка кликов (мышь и тач) ---
        canvas.addEventListener('click', function(e) {
            // Если это не мультитач (зум), обрабатываем клик
            if (!isPinching) {
                handleClick(e);
            }
        });

        // Отдельно обрабатываем одиночный тач (для телефонов)
        canvas.addEventListener('touchstart', function(e) {
            if (e.touches.length === 1) {
                // Сохраняем тач для возможного клика (если не было зума)
                const touch = e.touches[0];
                canvas._touchStartX = touch.clientX;
                canvas._touchStartY = touch.clientY;
                canvas._touchStartTime = Date.now();
            }
        }, { passive: true });

        canvas.addEventListener('touchend', function(e) {
            // Если был один палец и он остался, проверяем на клик
            if (e.changedTouches.length === 1) {
                const touch = e.changedTouches[0];
                // Проверяем, что палец не уехал далеко (значит это тап, не скролл)
                if (canvas._touchStartX !== undefined) {
                    const dx = touch.clientX - canvas._touchStartX;
                    const dy = touch.clientY - canvas._touchStartY;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    const time = Date.now() - canvas._touchStartTime;
                    // Если расстояние меньше 30px и время меньше 500ms - это клик
                    if (dist < 30 && time < 500 && !isPinching) {
                        handleClick({ clientX: touch.clientX, clientY: touch.clientY });
                    }
                }
            }
            canvas._touchStartX = undefined;
            canvas._touchStartY = undefined;
        }, { passive: true });

        // --- Инициализация ---
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                resizeCanvas();
            }, 200);
        });

        window.addEventListener('orientationchange', () => {
            setTimeout(resizeCanvas, 300);
            setTimeout(() => updateZoom(currentScale, false), 400);
        });

        generateLevel(level);
        updateHearts();
        resizeCanvas();
        gameLoop();

        // Небольшая задержка для корректного отображения зума
        setTimeout(() => {
            updateZoom(1, false);
        }, 100);

        console.log('Игра загружена! Используйте два пальца для приближения/отдаления.');
    </script>
</body>
